version: '3.8'

services:
  db:
    image: postgres:15
    restart: always
    container_name: docker-db-1
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh  # Ajout du script d'initialisation
    networks:
      - keycloak_network
  keycloak:
    # image: zeyneling/climb_app:climb_auth
    # pour le deploiment comment la ligne ci dessous et decommenter la ligne ci dessus
    image: zeyneling/climb_app:climb_auth_dev
    restart: always
    container_name: docker-keycloak-1
    ports:
      - "8443:8443"
    depends_on:
      - db
    networks:
      - keycloak_network
  # backend:
