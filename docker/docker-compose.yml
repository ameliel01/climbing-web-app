  #     - keycloak
  #   networks:
  #     - keycloak_network
  # frontend:
  #   image: zeyneling/climb_app:climb_front
  #   container_name: docker-frontend-1
  #   ports:
  #     - "443:443"
  #   environment:
  #     - REACT_APP_HOST=209.38.231.152
  #     - REACT_APP_PROTOCOL=https
  #     - REACT_APP_PORT=8000
  #   depends_on:
  #     - backend
