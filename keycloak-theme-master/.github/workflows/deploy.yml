on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    name: Build and Publish Maven artifact.
    runs-on: self-hosted
    steps:
      - name: Checkout latest code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'
          java-package: jdk
          architecture: x64
          server-id: nexus-snapshots
          server-username: NEXUS_USERNAME
          server-password: NEXUS_PASSWORD

      - name: Build jar file
        run: |
          mvn deploy
        env:
          NEXUS_USERNAME: ${{ secrets.NEXUS_USERNAME }}
          NEXUS_PASSWORD: ${{ secrets.NEXUS_PASSWORD }}

      - name: Set latest commit message as env variable
        run: echo LATEST_COMMIT_MESSAGE=$(git log --format=%B -n 1 ${{ github.event.after }} | tr \" \') >> $GITHUB_ENV

      - name: Notify msa-auth repo about updated keycloak theme update.
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.REPO_ACCESS_TOKEN }}
          repository: ubiqube/msa-auth
          event-type: jar-updated
          client-payload: '{"image_name": "ubiqube/keycloak-theme", "image_tag": "${{ github.sha }}", "latest_commit_message": "${{ env.LATEST_COMMIT_MESSAGE }}"}'
